name: Android APK

permissions:
  contents: write

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Accept licenses and install SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Verify release APK exists
        run: |
          ls -lah app/build/outputs/apk/release
          test -f app/build/outputs/apk/release/app-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chinesechess-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-build-${{ github.run_number }}
          name: CI Build #${{ github.run_number }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
          fail_on_unmatched_files: true
          overwrite_files: true
          body: |
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            Workflow: `${{ github.workflow }}`
